name: Continuous

on:
  workflow_dispatch: {}
  push: {}

jobs:

  linux-mac:
    strategy:
      matrix:
        cfg: [{os: ubuntu-latest, cxx: g++-16},
              {os: macos-latest, cxx: /opt/homebrew/opt/llvm@21/bin/clang++}] 
        config: [Release, Debug]

    runs-on:  ${{ matrix.cfg.os }}

    env:
      CXX: ${{ matrix.cfg.cxx }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install GCC 16 (Linux)
      if: matrix.cfg.os == 'ubuntu-latest'
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y g++-16

    - name: Install Clang 21 (macOS)
      if: matrix.cfg.os == 'macos-latest'
      run: |
        brew install llvm@21


    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DUM_UNIT_TESTS=ON

    - name: CMake Build
      run: cmake --build build --parallel

    - name: CTest
      run: ctest --test-dir build -V

  windows-msvc:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B build -DUM_UNIT_TESTS=ON

    - name: Release build
      run: cmake --build build --parallel --config Release

    - name: Release CTest
      run: ctest --test-dir build -C Release -V

    - name: Debug build
      run: cmake --build build --parallel --config Debug

    - name: Debug CTest
      run: ctest --test-dir build -C Debug -V
